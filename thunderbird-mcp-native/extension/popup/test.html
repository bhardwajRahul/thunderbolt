<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test Popup</title>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <h1>Test Popup</h1>
  <p>If you can see this, the popup is working!</p>
  <button id="testBtn">Test Button</button>
  <script>
    document.getElementById('testBtn').addEventListener('click', () => {
      alert('Button clicked!');
    });
  </script>
</body>
</html>
