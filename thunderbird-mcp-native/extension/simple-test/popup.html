<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Thunderbird MCP</title>
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    h1 {
      color: #333;
      font-size: 20px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <h1>Thunderbird MCP Server</h1>
  <p>Version: 1.0.4</p>
  <p>If you can see this, the popup is working!</p>
  <button id="testBtn">Test Button</button>
  
  <script>
    console.log('Popup script loaded');
    document.getElementById('testBtn').addEventListener('click', () => {
      console.log('Button clicked!');
      browser.runtime.sendMessage({ action: 'getServerStatus' }).then(response => {
        console.log('Got response:', response);
        alert('Server status: ' + JSON.stringify(response));
      }).catch(err => {
        console.error('Error:', err);
        alert('Error: ' + err.message);
      });
    });
  </script>
</body>
</html>
